<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner-Shooter: Squad Assault</title>
    <!-- Prevent favicon 404 error with explicit definitions -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Modern modular CSS architecture -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>

        <!-- Main Menu -->
        <div id="menuOverlay" class="menu-overlay">
            <div class="game-info">
                <div>Coins: <span id="menuCoins">1000</span></div>
            </div>
            <button class="menu-button" id="newGameBtn">Neues Spiel</button>
            <button class="menu-button" id="connectBtn">Server Verbinden (Optional)</button>
        </div>

        <!-- Pause Menu -->
        <div id="pauseOverlay" class="pause-overlay hidden">
            <h2>Pausiert</h2>
            <p>Drücke R zum Neustarten</p>
        </div>

        <!-- Game Over Menu -->
        <div id="gameOverOverlay" class="pause-overlay hidden">
            <h2 id="gameOverText">Game Over!</h2>
            <p>Drücke R zum Neustarten</p>
        </div>

        <!-- UI Overlay -->
        <div id="uiOverlay" class="ui-overlay hidden">
            <div>Coins: <span id="gameCoins">1000</span></div>
            <div id="connectionStatus" class="connection-status">Offline Mode</div>
        </div>

        <!-- Level Display Overlay -->
        <div id="levelDisplay" class="level-display above-player">Level: 1</div>

        <!-- Character Window -->
        <div id="characterWindow" class="character-window hidden">
            <h3>Charakter Info</h3>
            <div id="characterStats"></div>
        </div>

        <!-- Talents Window -->
        <div id="talentsWindow" class="talents-window hidden">
            <h3>Talente</h3>
            <div>Verfügbar: <span id="availableTalents">0</span></div>
            <p>Drücke T zum Zurücksetzen (-100 Coins)</p>
        </div>        <!-- Weapon upgrades are now handled automatically with notifications -->

        <!-- Mobile Controls Area -->
        <div id="mobileControlsArea" class="mobile-controls-area" style="display: none;">
            <!-- Mobile Game Info -->
            <div class="mobile-game-info">
                <div>Leben: <span id="mobileHealth">3</span></div>
                <div>Level: <span id="mobileLevel">1</span></div>
                <div>Kills: <span id="mobileKills">0</span></div>
            </div>

            <!-- Touch Controls for Mobile -->
            <div id="touchControls" class="touch-controls">
                <button class="touch-button left" id="moveLeftBtn">←</button>
                <button class="touch-button shoot" id="shootBtn">🔥</button>
                <button class="touch-button right" id="moveRightBtn">→</button>
            </div>
        </div>

        <!-- Tap to shoot area for mobile -->
        <div id="tapToShootArea" class="tap-to-shoot-area"></div>
    </div>

    <!-- Modern modular JavaScript architecture -->
    <script src="js/config.js"></script>
    <script src="js/websocket.js"></script>

    <!-- Base classes (load first) -->
    <script src="js/entities/base-sprite.js"></script>

    <!-- Entity classes -->
    <script src="js/entities/player.js"></script>
    <script src="js/entities/projectile.js"></script>
    <script src="js/entities/enemy.js"></script>
    <script src="js/entities/gate.js"></script>
    <script src="js/entities/boss.js"></script>

    <!-- Effect classes -->
    <script src="js/effects/particles.js"></script>

    <!-- Game systems -->
    <script src="js/systems/collision.js"></script>
    <script src="js/systems/spawning.js"></script>
    <script src="js/systems/data-manager.js"></script>
    <script src="js/systems/ui-manager.js"></script>
    <script src="js/core/game-loop.js"></script>

    <!-- Renderer and input handling -->
    <script src="js/renderer.js"></script>
    <script src="js/inputHandler.js"></script>

    <!-- Main game initialization -->
    <script src="js/main.js"></script>
</body>
</html>
